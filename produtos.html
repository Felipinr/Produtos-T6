<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T6 Medicina - Loja Oficial</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rosa-principal: #e91e63;
      --rosa-escuro: #880e4f;
      --rosa-hover: #ff4081;
      --dourado: #d4af37;
      --cinza-header: #f4f4f4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #fff0f5, #ffe4ec);
      color: #333;
    }

    /* HEADER ESTILO PROFISSIONAL */
    header {
      background: var(--cinza-header);
      padding: 0 60px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px;
      max-width: 1300px;
      margin: auto;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-area img {
      height: 70px;
      width: auto;
      /* removido fundo branco */
    }

    .brand {
      font-weight: 700;
      font-size: 20px;
      color: var(--rosa-escuro);
      letter-spacing: 1px;
    }

    .menu {
      list-style: none;
      display: flex;
      gap: 40px;
    }

    .menu li a {
      text-decoration: none;
      font-weight: 600;
      color: #444;
      letter-spacing: 1px;
      position: relative;
      transition: 0.3s ease;
    }

    .menu li a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 3px;
      left: 0;
      bottom: -8px;
      background: var(--rosa-principal);
      transition: 0.3s ease;
    }

    .menu li a:hover {
      color: var(--rosa-principal);
    }

    .menu li a:hover::after {
      width: 100%;
    }

    /* PRODUTOS */
    .produtos {
      display: flex;
      justify-content: center;
      gap: 50px;
      padding: 80px 20px;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: auto;
    }

    .produto {
      background: white;
      width: 300px;
      height: 360px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .produto::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 6px;
      top: 0;
      left: 0;
      background: linear-gradient(90deg, var(--rosa-principal), var(--dourado));
    }

    .produto:hover {
      transform: translateY(-15px);
      box-shadow: 0 25px 45px rgba(0,0,0,0.25);
    }

    .produto h2 {
      color: var(--rosa-escuro);
      margin-bottom: 15px;
      font-size: 22px;
    }

    .produto p {
      color: #666;
      font-size: 15px;
      text-align: center;
      padding: 0 25px;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .produto button {
      background: linear-gradient(135deg, var(--rosa-principal), var(--rosa-escuro));
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 15px rgba(233,30,99,0.4);
    }

    .produto button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(233,30,99,0.6);
    }

    footer {
      text-align: center;
      padding: 25px;
      background: linear-gradient(135deg, #880e4f, #ad1457);
      color: white;
      font-size: 14px;
      letter-spacing: 1px;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      header {
        padding: 0 20px;
      }

      .menu {
        gap: 20px;
      }

      .brand {
        display: none;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo-area">
        <a href="index.html" class="logo-link">
          <img src="/imagens/logot6.png.png" alt="Logo T6 Medicina">
        </a>
        <span class="brand">T6 Store</span>
      </div>
      <ul class="menu">
        <li><a href="index.html">INÍCIO</a></li>
        <li><a href="produtos.html">PRODUTOS</a></li>
        <li><a href="dev.html">DESENVOLVEDOR</a></li>
      </ul>
    </nav>
  </header>

  <section class="produtos" id="produtos">
    <div class="produto">
      <h2>Produto 1</h2>
      <p>Produto exclusivo da turma T6 Medicina. Qualidade premium e edição limitada.</p>
      <button>Comprar</button>
    </div>

    <div class="produto">
      <h2>Produto 2</h2>
      <p>Produto oficial da T6 UNIRV. Design sofisticado inspirado no brasão da turma.</p>
      <button>Comprar</button>
    </div>
  </section>

  <footer>
    © 2025 - 2031 | T6 Medicina | UNIRV
  </footer>

</body>
</html>
