<script>

let pacienteAtual

let score=0

let tempo=0

let ritmo="sinusal"

const doencas=[

{

},

},

{

sintomas:["tosse","febre","dispneia"],

fc:[100,120],

temp:[38,39],

sat:[88,94],

ritmo:"sinusal"

},

{

nome:"parasito",

sintomas:["diarreia","anemia","dor abdominal"],

fc:[80,100],

temp:[37,38],

sat:[95,99],

ritmo:"sinusal"

},

{

nome:"ansiedade",

sintomas:["palpitação","tremor","medo"],

fc:[110,130],

sat:[97,100],

ritmo:"taquicardia"

}

function startGame(){

document.getElementById("menu").style.display="none"

document.getElementById("game").style.display="block"

}

function novoPaciente(){

pacienteAtual=

doencas[Math.floor(Math.random()*doencas.length)]

let temp=random(pacienteAtual.temp)

+" bpm"

+"<br>Temp "+temp

+"°C"

+"<br>Sat "+sat+"%"

function diagnosticar(d){

if(d==pacienteAtual.nome){

score+=10

log("Diagnóstico correto")

}else{

score-=5

log("Diagnóstico errado")

}

updateScore()

setTimeout(novoPaciente,2000)

}

function rcp(){

score+=5

log("RCP realizada")

updateScore()

}

function choque(){

score+=7

log("Choque aplicado")

updateScore()

}

function medicar(){

score+=3

log("Medicação administrada")

}

document.getElementById("score").innerText=score

}

function log(t){

let l=document.getElementById("log")

l.innerHTML+=t+"<br>"

l.scrollTop=l.scrollHeight

}

function random(arr){

return Math.floor(Math.random()*(arr[1]-arr[0]))+arr[0]

}
/* =========================
   SISTEMA DE ECG AVANÇADO
========================= */

let canvas = document.getElementById("ecg")
let ctx = canvas.getContext("2d")

let x=0

function loopECG(){

setInterval(()=>{

desenharECG()

},40)

}

/* =========================
   DESENHAR ECG
========================= */

function desenharECG(){

ctx.fillStyle="black"

ctx.fillRect(0,0,500,200)

ctx.strokeStyle="#00ff00"

ctx.lineWidth=2

ctx.beginPath()

let yBase=100

ctx.moveTo(0,yBase)

for(let i=0;i<500;i+=8){

let y=yBase

if(ritmo=="sinusal"){

y=yBase+ondaSinusal(i)

}

if(ritmo=="taquicardia"){

y=yBase+ondaTaquicardia(i)

}

if(ritmo=="bradicardia"){

y=yBase+ondaBradicardia(i)

}

if(ritmo=="fibrilacao"){

y=yBase+ondaFibrilacao(i)

}

if(ritmo=="assistolia"){

y=yBase

}

ctx.lineTo(i,y)

}

ctx.stroke()

}

/* =========================
   ONDAS ECG
========================= */

function ondaSinusal(i){

return Math.sin((x+i)/15)*10

}

function ondaTaquicardia(i){

return Math.sin((x+i)/7)*18

}

function ondaBradicardia(i){

return Math.sin((x+i)/30)*10

}

function ondaFibrilacao(i){

return (Math.random()*40)-20

}

x+=4

========================= */

tempo++

ritmo="fibrilacao"

log("⚠ Paciente entrou em fibrilação ventricular!")

}

}

if(tempo>40){

if(Math.random()<0.30){

ritmo="assistolia"

}

}

========================= */

========================= */

]

const comorbidades = [

"diabetes",

"tabagismo",

"palidez",

"creatinina",

========================= */

function gerarPacienteIA(){

let nome = nomes[Math.floor(Math.random()*nomes.length)]

nome:nome,

idade:idade,

doenca:base.nome,

sintomas:[...base.sintomas,sintExtra],

comorbidade:comorb,

fc:random(base.fc),

temp:random(base.temp),

sat:random(base.sat)

}

mostrarPacienteIA()

}

/* =========================
   MOSTRAR PACIENTE
========================= */

texto += "FC: "+pacienteIA.fc+" bpm<br>"

texto += "Temp: "+pacienteIA.temp+" °C<br>"

}

/* =========================
   ECG COM ONDA P-QRS-T
========================= */

function ondaECGReal(i){

let ciclo = (x+i)%120

if(ciclo<10) return -5

if(ciclo<20) return -15

if(ciclo<25) return 40   // QRS

if(ciclo<35) return -10

if(ciclo<50) return 10   // T

return 0

}

/* substituir ritmo sinusal pelo real */

function ondaSinusal(i){

return ondaECGReal(i)

}

========================= */

/* =========================================
   PARTE 6 — RANKING DA TURMA
========================================= */

let playerName = "";
let savedPatients = 0;
let lostPatients = 0;

function askPlayerName(){

    playerName = prompt("Digite seu nome para o ranking da turma:");

    if(playerName === null || playerName.trim() === ""){
        playerName = "Interno_" + Math.floor(Math.random()*1000);
    }

}

askPlayerName();

function updateScore(points){

    score += points;

    if(score < 0){
        score = 0;
    }

    document.getElementById("score").innerText = score;

}

function patientSaved(){

    savedPatients++;

    updateScore(100);

    saveRanking();

}

function patientLost(){

    lostPatients++;

    updateScore(-50);

    saveRanking();

}

function saveRanking(){

    let ranking = JSON.parse(localStorage.getItem("medRanking")) || [];

    let existing = ranking.find(p => p.name === playerName);

    if(existing){

        existing.score = score;
        existing.saved = savedPatients;
        existing.lost = lostPatients;

    } else {

        ranking.push({
            name: playerName,
            score: score,
            saved: savedPatients,
            lost: lostPatients
        });

    }

    ranking.sort((a,b)=> b.score - a.score);

    localStorage.setItem("medRanking", JSON.stringify(ranking));

    renderRanking();

}

function renderRanking(){

    let ranking = JSON.parse(localStorage.getItem("medRanking")) || [];

    let board = document.getElementById("rankingBoard");

    if(!board) return;

    board.innerHTML = "";

    ranking.slice(0,10).forEach((p,i)=>{

        let row = document.createElement("div");

        row.className = "rankRow";

        row.innerHTML = `
            <span>#${i+1}</span>
            <span>${p.name}</span>
            <span>${p.score} pts</span>
            <span>🩺 ${p.saved}</span>
            <span>💀 ${p.lost}</span>
        `;

        board.appendChild(row);

    });

}

renderRanking();

/* =========================================
   SISTEMA DE BATIMENTO
========================================= */

let heartInterval = null;

function startHeartMonitor(){

if(heartInterval) clearInterval(heartInterval);

let bpm = heartRhythms[currentRhythm].bpm;

if(bpm === 0){

sounds.flatline.play();

return;

}

let interval = 60000 / bpm;

heartInterval = setInterval(()=>{

sounds.monitor.currentTime = 0;

sounds.monitor.play();

pulseAnimation();

}, interval);

}

/* =========================================
   ANIMAÇÃO DO PULSO
========================================= */

function pulseAnimation(){

const monitor = document.getElementById("ecgLine");

if(!monitor) return;

monitor.classList.remove("pulse");

void monitor.offsetWidth;

monitor.classList.add("pulse");

}

mostrarAnalise(resultados);

hud.style.position="fixed";

hud.style.top="20px";

hud.style.right="20px";

hud.style.background="#000";

hud.style.padding="10px 20px";

hud.style.border="2px solid #00ff9c";

hud.style.borderRadius="10px";

hud.style.color="white";

hud.style.fontFamily="monospace";

document.body.appendChild(hud);

}

hud.innerHTML = "🏆 Pontuação: " + score;

}

/* =========================================
   GAME OVER
========================================= */

function gameOver(){

let tela = document.createElement("div");

tela.style.position="fixed";

tela.style.top="0";

tela.style.left="0";

tela.style.width="100%";

tela.style.height="100%";

tela.style.background="rgba(0,0,0,0.9)";

tela.style.display="flex";

tela.style.flexDirection="column";

tela.style.alignItems="center";

tela.style.justifyContent="center";

tela.style.color="white";

tela.style.fontSize="30px";

tela.innerHTML=`

<h1>☠️ Paciente Perdido</h1>

<p>Pontuação Final: ${score}</p>

<button onclick="reiniciarJogo()">Reiniciar Plantão</button>

`;

document.body.appendChild(tela);

salvarRanking(score);

}

/* =========================================
   REINICIAR JOGO
========================================= */

function reiniciarJogo(){

location.reload();

}

/* =========================================
   RANKING DA TURMA
========================================= */

function salvarRanking(pontos){

let ranking = JSON.parse(localStorage.getItem("rankingT6") || "[]");

ranking.push(pontos);

ranking.sort((a,b)=>b-a);

ranking = ranking.slice(0,10);

localStorage.setItem("rankingT6",JSON.stringify(ranking));

}

/* =========================================
   MOSTRAR RANKING
========================================= */

function mostrarRanking(){

let ranking = JSON.parse(localStorage.getItem("rankingT6") || "[]");

let painel = document.createElement("div");

painel.style.position="fixed";

painel.style.left="50%";

painel.style.top="50%";

painel.style.transform="translate(-50%,-50%)";

painel.style.background="#111";

painel.style.padding="30px";

painel.style.border="2px solid gold";

painel.style.borderRadius="10px";

painel.style.color="white";

painel.style.fontFamily="monospace";

let html="<h2>🏆 Ranking T6</h2>";

ranking.forEach((p,i)=>{

html += `<p>${i+1}º - ${p} pts</p>`;

});

html += `<br><button onclick="location.reload()">Fechar</button>`;

painel.innerHTML = html;

document.body.appendChild(painel);

}

/* =========================================
   BOTÃO RANKING
========================================= */

function criarBotaoRanking(){

let btn=document.createElement("button");

btn.innerText="🏆 Ranking";

btn.style.position="fixed";

btn.style.bottom="20px";

btn.style.right="20px";

btn.style.padding="10px";

btn.onclick=mostrarRanking;

document.body.appendChild(btn);

}

criarBotaoRanking();

atualizarScore();

</script>
