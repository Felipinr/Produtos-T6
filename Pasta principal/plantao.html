<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>404 - Página não encontrada</title>

<style>
body{
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
    color:white;
    font-family:'Courier New', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:url("/imagens/logot6.png.png") no-repeat center;
    background-size:400px;
    opacity:0.15; /* controla suavidade */
    pointer-events:none;
}

h1{
    font-size:110px;
    margin:0;
    letter-spacing:8px;
}

.zero{
    display:inline-block;
    cursor:pointer;
    transition:0.3s;
}

.zero:hover{
    color:#00ffcc;
    text-shadow:0 0 8px #00ffcc;
}

p{
    opacity:0.7;
    margin-top:-15px;
    font-size:18px;
    text-align:center;
    max-width:400px;
}

#coupon{
    margin-top:40px;
    padding:18px 35px;
    background:#00ffcc;
    color:#000;
    font-size:20px;
    letter-spacing:3px;
    border-radius:8px;
    display:none;
    animation:fadeIn 0.8s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<h1>
4<span class="zero">0</span>4
</h1>

<p>
Se não encontrou o caminho, <br>
revise a anamnese e tente novamente.
</p>

<div id="coupon">
🎟 CUPOM: t6éamelhor
</div>

<script>
let clicks = 0;
let zero = document.querySelector(".zero");
let coupon = document.getElementById("coupon");

zero.addEventListener("click", function(){
    clicks++;

    if(clicks === 5){
        coupon.style.display = "block";
    }
});
</script>

</body>
</html>
