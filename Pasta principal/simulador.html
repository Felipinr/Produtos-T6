<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>T6 MEDICINA | Custom 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --brand-color:#e91e63;
  --bg-color:#ffffff;
  --panel-bg:rgba(255,255,255,0.95);
  --border-color:rgba(0,0,0,0.08);
}

*{box-sizing:border-box}
body{margin:0;background:var(--bg-color);font-family:'Inter',sans-serif;overflow:hidden}
#viewport{position:absolute;top:0;left:0;width:100vw;height:100vh}

#sidebar{
  position:absolute;
  top:20px;
  left:20px;
  width:420px;
  height:calc(100vh - 40px);
  background:var(--panel-bg);
  border:1px solid var(--border-color);
  border-radius:20px;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
  z-index:10;
}

h2{
  font-family:'Archivo Black';
  text-align:center;
  font-size:1.25rem;
  margin:0;
}
h2 span{color:var(--brand-color)}

.control-group{display:flex;flex-direction:column;gap:6px}
label{font-size:11px;text-transform:uppercase;font-weight:800;color:#666}
input,select,button{padding:10px;border-radius:10px;border:1px solid #e0e0e0;font-weight:600}
input[type="color"]{padding:4px;height:40px}
input[type="range"]{width:100%}
.row{display:flex;gap:8px}
.small{flex:1}
.btn-save{margin-top:auto;background:#111;color:#fff;border:none;padding:12px;border-radius:30px;font-weight:900;cursor:pointer}
.btn-save:hover{background:var(--brand-color)}
.btn-template{cursor:pointer;background:#f6f6f6}
.btn-template:hover{background:#eee}
.note{font-size:12px;color:#444}

.badge{display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border-radius:999px;padding:4px 10px;background:#111;color:#fff;width:max-content}
</style>
</head>

<body>

<div id="sidebar">

  <h2>T6 <span>MEDICINA</span></h2>

  <div class="control-group">
    <label>Nome (costas)</label>
    <input type="text" id="nameInput" value="FELIPE">
  </div>

  <div class="control-group">
    <label>Número (costas)</label>
    <input type="number" id="numInput" value="10">
  </div>

  <div class="control-group row">
    <div class="small">
      <label>Cor do Nome</label>
      <input type="color" id="nameColor" value="#ffffff">
    </div>
    <div class="small">
      <label>Cor do Número</label>
      <input type="color" id="numColor" value="#ffffff">
    </div>
  </div>

  <div class="control-group row">
    <div class="small">
      <label>Cor Principal</label>
      <input type="color" id="mainColor" value="#ffffff">
    </div>
    <div class="small">
      <label>Cor Secundária</label>
      <input type="color" id="secColor" value="#e91e63">
    </div>
  </div>

  <div class="control-group">
    <label>Padrão</label>
    <select id="patternInput">
      <option value="none">Sólida</option>
      <option value="stripes_v">Listras Verticais</option>
      <option value="stripes_h">Listras Horizontais</option>
      <option value="checker">Xadrez</option>
      <option value="grid">Grid</option>
      <option value="dots">Pontos</option>
      <option value="diagonal">Diagonal</option>
      <option value="sash">Faixa Diagonal</option>
      <option value="half">Meio a Meio</option>
      <option value="hoops">Aros (hoops)</option>
      <option value="chevrons">Chevron</option>
      <option value="pinstripes">Pinstripes</option>
    </select>
  </div>

  <div class="control-group">
    <label>Escala do Padrão</label>
    <input type="range" id="patScale" min="20" max="400" value="150">
  </div>

  <div class="control-group">
    <label>Modelo inspirado</label>
    <select id="presetInput">
      <option value="manual">Manual (cores livres)</option>
      <option value="classic_stripes">Clássico Listrado</option>
      <option value="retro_hoops">Retrô com Aros</option>
      <option value="modern_sash">Moderno com Faixa</option>
      <option value="two_halves">Meio a Meio Tradicional</option>
      <option value="dark_pinstripe">Noturno Pinstripe</option>
      <option value="royal_diagonal">Diagonal Real</option>
      <option value="checker_attack">Quadriculado Ofensivo</option>
      <option value="warm_chevron">Chevron Quente</option>
    </select>
    <button class="btn-template" id="btnInfinite">Ideias de modelos</button>
    <span class="badge" id="modelBadge">Modelo atual: Manual</span>
  </div>

  <hr>

  <div class="control-group">
    <label>Logo T6 (frente) — posição (FIXA)</label>
    <select id="logoPos">
      <option value="left">Esquerda</option>
      <option value="center" selected>Centralizada</option>
      <option value="right">Direita</option>
    </select>
  </div>

  <div class="control-group">
    <label><input type="checkbox" id="logoShow" checked> Mostrar logo</label>
  </div>

  <button class="btn-save" id="btnSave">Salvar (exportar imagem)</button>

</div>

<div id="viewport"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls, texture;

const canvas = document.createElement('canvas');
canvas.width = 4096;
canvas.height = 4096;
const ctx = canvas.getContext('2d');

const PRESETS = {
  classic_stripes: { label:'Clássico Listrado', pattern:'stripes_v', scale:170, main:'#f5f5f5', sec:'#005bbb', name:'#ffffff', num:'#ffffff' },
  retro_hoops: { label:'Retrô com Aros', pattern:'hoops', scale:180, main:'#106d37', sec:'#ffffff', name:'#ffffff', num:'#ffffff' },
  modern_sash: { label:'Moderno com Faixa', pattern:'sash', scale:210, main:'#ffffff', sec:'#c1121f', name:'#101010', num:'#101010' },
  two_halves: { label:'Meio a Meio Tradicional', pattern:'half', scale:200, main:'#1d3557', sec:'#e63946', name:'#ffffff', num:'#ffffff' },
  dark_pinstripe: { label:'Noturno Pinstripe', pattern:'pinstripes', scale:110, main:'#111827', sec:'#60a5fa', name:'#ffffff', num:'#ffffff' },
  royal_diagonal: { label:'Diagonal Real', pattern:'diagonal', scale:150, main:'#0b4f9f', sec:'#f8fafc', name:'#ffffff', num:'#ffffff' },
  checker_attack: { label:'Quadriculado Ofensivo', pattern:'checker', scale:280, main:'#ffffff', sec:'#d62828', name:'#111111', num:'#111111' },
  warm_chevron: { label:'Chevron Quente', pattern:'chevrons', scale:220, main:'#ffb703', sec:'#fb8500', name:'#111111', num:'#111111' }
};

// logo local
const logoImg = new Image();
logoImg.crossOrigin = "anonymous";
logoImg.src = "/imagens/logot6.png.png";
logoImg.onload = () => updateDesign();

// Tamanho fixo da logo
const LOGO_FIXED_SIZE = 300; // pixels

function seededRand(seed){
  let t = seed + 0x6D2B79F5;
  t = Math.imul(t ^ t >>> 15, t | 1);
  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

function hslToHex(h, s, l){
  s /= 100;
  l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;

  if(h < 60){ r = c; g = x; }
  else if(h < 120){ r = x; g = c; }
  else if(h < 180){ g = c; b = x; }
  else if(h < 240){ g = x; b = c; }
  else if(h < 300){ r = x; b = c; }
  else { r = c; b = x; }

  const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2, '0');
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

function randomHex(seedOffset){
  const h = Math.floor(seededRand(Date.now() + seedOffset) * 360);
  const s = 65 + Math.floor(seededRand(Date.now() + seedOffset + 77) * 25);
  const l = 35 + Math.floor(seededRand(Date.now() + seedOffset + 144) * 35);
  return hslToHex(h, s, l);
}

function applyPreset(def, badgeText){
  document.getElementById('patternInput').value = def.pattern;
  document.getElementById('patScale').value = def.scale;
  document.getElementById('mainColor').value = def.main;
  document.getElementById('secColor').value = def.sec;
  document.getElementById('nameColor').value = def.name;
  document.getElementById('numColor').value = def.num;
  document.getElementById('modelBadge').textContent = `Modelo atual: ${badgeText}`;
  updateDesign();
}

function applyInfiniteModel(){
  const patterns = ['stripes_v','stripes_h','checker','grid','dots','diagonal','sash','half','hoops','chevrons','pinstripes'];
  const pat = patterns[Math.floor(Math.random() * patterns.length)];
  const model = {
    pattern: pat,
    scale: 70 + Math.floor(Math.random() * 250),
    main: randomHex(1),
    sec: randomHex(2),
    name: '#ffffff',
    num: '#ffffff'
  };

  applyPreset(model, `Infinito #${Math.floor(Math.random()*100000)}`);
  document.getElementById('presetInput').value = 'manual';
}

/* ---------------- PATTERN ---------------- */

function drawPattern(pat,c1,c2,scale){
  ctx.clearRect(0,0,4096,4096);
  ctx.fillStyle = c1;
  ctx.fillRect(0,0,4096,4096);

  if(pat === "none") return;

  ctx.fillStyle = c2;
  const s = parseInt(scale,10);

  if(pat === "stripes_v")
    for(let i=0;i<4096;i+=s) ctx.fillRect(i,0,s/2,4096);

  if(pat === "stripes_h")
    for(let i=0;i<4096;i+=s) ctx.fillRect(0,i,4096,s/2);

  if(pat === "checker")
    for(let i=0;i<4096;i+=s)
      for(let j=0;j<4096;j+=s)
        if(((i+j)/s)%2==0) ctx.fillRect(i,j,s,s);

  if(pat === "grid"){
    ctx.strokeStyle = c2;
    ctx.lineWidth = Math.max(1, s/80);
    for(let i=0;i<4096;i+=s){
      ctx.beginPath();
      ctx.moveTo(i,0);
      ctx.lineTo(i,4096);
      ctx.moveTo(0,i);
      ctx.lineTo(4096,i);
      ctx.stroke();
    }
  }

  if(pat === "dots")
    for(let i=0;i<4096;i+=s)
      for(let j=0;j<4096;j+=s){
        ctx.beginPath();
        ctx.arc(i,j,s/4,0,Math.PI*2);
        ctx.fill();
      }

  if(pat === "diagonal"){
    ctx.save();
    ctx.translate(2048, 2048);
    ctx.rotate(-Math.PI / 4);
    for(let i=-5000;i<5000;i+=s){
      ctx.fillRect(i, -5000, s/2, 10000);
    }
    ctx.restore();
  }

  if(pat === "sash"){
    ctx.save();
    ctx.translate(2048, 2048);
    ctx.rotate(-Math.PI / 5.2);
    ctx.fillRect(-280, -5000, 560, 10000);
    ctx.restore();
  }

  if(pat === "half"){
    ctx.fillRect(0,0,2048,4096);
  }

  if(pat === "hoops"){
    for(let i=0;i<4096;i+=s){
      if((i/s)%2===0) ctx.fillRect(0,i,4096,s/2);
    }
  }

  if(pat === "chevrons"){
    ctx.strokeStyle = c2;
    ctx.lineWidth = Math.max(6, s/8);
    for(let y=-s; y<4096+s; y+=s){
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(2048, y + s/2);
      ctx.lineTo(4096, y);
      ctx.stroke();
    }
  }

  if(pat === "pinstripes"){
    for(let i=0;i<4096;i+=Math.max(12, s/3)){
      ctx.fillRect(i,0,3,4096);
    }
  }
}

function drawLogo(pos, show){
  if(!show) return;
  if(!logoImg.complete) return;

  const size = LOGO_FIXED_SIZE;

  const centerX = 1190;
  const chestY  = 1840;
  const offset  = 420;

  let x = centerX - size/2;
  if(pos === "left")  x = centerX - offset - size/2;
  if(pos === "right") x = centerX + offset - size/2;

  let y = chestY - size/2;

  ctx.save();
  ctx.translate(x + size/2, y + size/2);
  ctx.rotate(Math.PI);

  if(pos === "right") ctx.scale(-1,1);

  ctx.drawImage(logoImg, -size/2, -size/2, size, size);
  ctx.restore();
}

function drawBack(name,num,nameColor,numColor){
  ctx.save();
  ctx.translate(3072,1800);
  ctx.rotate(Math.PI);
  ctx.scale(-1,1);

  ctx.textAlign="center";
  ctx.shadowColor="rgba(0,0,0,0.6)";
  ctx.shadowBlur=20;

  if(name){
    ctx.fillStyle=nameColor;
    ctx.font="900 220px Archivo Black";
    ctx.fillText(name.toUpperCase(),0,-200);
  }

  if(num){
    ctx.fillStyle=numColor;
    ctx.font="900 900px Archivo Black";
    ctx.fillText(num,0,750);
  }

  ctx.restore();
}

function updateDesign(){
  drawPattern(
    document.getElementById("patternInput").value,
    document.getElementById("mainColor").value,
    document.getElementById("secColor").value,
    document.getElementById("patScale").value
  );

  drawLogo(
    document.getElementById("logoPos").value,
    document.getElementById("logoShow").checked
  );

  drawBack(
    document.getElementById("nameInput").value,
    document.getElementById("numInput").value,
    document.getElementById("nameColor").value,
    document.getElementById("numColor").value
  );

  if(texture) texture.needsUpdate = true;
}

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(18, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById("viewport").appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,2));

  const light = new THREE.DirectionalLight(0xffffff,1.3);
  light.position.set(5,5,5);
  scene.add(light);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  texture = new THREE.CanvasTexture(canvas);
  texture.flipY = false;

  new GLTFLoader().load("oversized_t-shirt.glb", (gltf) => {

    const shirt = gltf.scene;

    const box = new THREE.Box3().setFromObject(shirt);
    const center = box.getCenter(new THREE.Vector3());
    shirt.position.sub(center);
    shirt.scale.set(1.05,1.05,1.05);

    shirt.traverse(c => {
      if(c.isMesh){
        c.material = new THREE.MeshStandardMaterial({map: texture, roughness: 0.6, metalness: 0});
      }
    });

    scene.add(shirt);

    camera.position.set(0,0,8);
    controls.target.set(0,0,0);
    controls.update();

    updateDesign();
  }, undefined, (err) => {
    console.error("Erro ao carregar o GLB:", err);
  });

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

document.querySelectorAll("input,select").forEach(e => e.oninput = updateDesign);

document.getElementById('presetInput').addEventListener('change', (e) => {
  if(e.target.value === 'manual'){
    document.getElementById('modelBadge').textContent = 'Modelo atual: Manual';
    return;
  }

  const preset = PRESETS[e.target.value];
  if(preset) applyPreset(preset, preset.label);
});

document.getElementById('btnInfinite').addEventListener('click', applyInfiniteModel);

document.getElementById("btnSave").onclick = () => {
  const link = document.createElement("a");
  link.download = "camisa_t6.png";
  link.href = renderer.domElement.toDataURL();
  link.click();
};

init();

</script>
</body>
</html>
