<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>T6 MEDICINA | Custom 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --brand-color:#e91e63;
  --bg-color:#ffffff;
  --panel-bg:rgba(255,255,255,0.95);
  --border-color:rgba(0,0,0,0.08);
}

*{box-sizing:border-box}
body{margin:0;background:var(--bg-color);font-family:'Inter',sans-serif;overflow:hidden}
#viewport{position:absolute;top:0;left:0;width:100vw;height:100vh}

#sidebar{
  position:absolute;
  top:20px;
  left:20px;
  width:420px;
  height:calc(100vh - 40px);
  background:var(--panel-bg);
  border:1px solid var(--border-color);
  border-radius:20px;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
  z-index:10;
}

h2{
  font-family:'Archivo Black';
  text-align:center;
  font-size:1.25rem;
  margin:0;
}
h2 span{color:var(--brand-color)}

.control-group{display:flex;flex-direction:column;gap:6px}
label{font-size:11px;text-transform:uppercase;font-weight:800;color:#666}
input,select{padding:10px;border-radius:10px;border:1px solid #e0e0e0;font-weight:600}
input[type="color"]{padding:4px;height:40px}
input[type="range"]{width:100%}
.row{display:flex;gap:8px}
.small{flex:1}
.btn-save{margin-top:auto;background:#111;color:#fff;border:none;padding:12px;border-radius:30px;font-weight:900;cursor:pointer}
.btn-save:hover{background:var(--brand-color)}
.note{font-size:12px;color:#444}
</style>
</head>

<body>

<div id="sidebar">

  <h2>T6 <span>MEDICINA</span></h2>

  <div class="control-group">
    <label>Nome (costas)</label>
    <input type="text" id="nameInput" value="FELIPE">
  </div>

  <div class="control-group">
    <label>Número (costas)</label>
    <input type="number" id="numInput" value="10">
  </div>

  <div class="control-group row">
    <div class="small">
      <label>Cor do Nome</label>
      <input type="color" id="nameColor" value="#ffffff">
    </div>
    <div class="small">
      <label>Cor do Número</label>
      <input type="color" id="numColor" value="#ffffff">
    </div>
  </div>

  <div class="control-group row">
    <div class="small">
      <label>Cor Principal</label>
      <input type="color" id="mainColor" value="#ffffff">
    </div>
    <div class="small">
      <label>Cor Secundária</label>
      <input type="color" id="secColor" value="#e91e63">
    </div>
  </div>

  <div class="control-group">
    <label>Padrão</label>
    <select id="patternInput">
      <option value="none">Sólida</option>
      <option value="stripes_v">Listras Verticais</option>
      <option value="stripes_h">Listras Horizontais</option>
      <option value="checker">Xadrez</option>
      <option value="grid">Grid</option>
      <option value="dots">Pontos</option>
    </select>
  </div>

  <div class="control-group">
    <label>Escala do Padrão</label>
    <input type="range" id="patScale" min="20" max="400" value="150">
  </div>

  <hr>

  <div class="control-group">
    <label>Logo T6 (frente) — posição (FIXA)</label>
    <select id="logoPos">
      <option value="left">Esquerda</option>
      <option value="center" selected>Centralizada</option>
      <option value="right">Direita</option>
    </select>
  </div>

  <!-- REMOVIDO: Escala do logo (controle retirado a pedido) -->

  <div class="control-group">
    <label><input type="checkbox" id="logoShow" checked> Mostrar logo</label>
  </div>

  <button class="btn-save" id="btnSave">Salvar (exportar imagem)</button>

</div>

<div id="viewport"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls, texture;

const canvas = document.createElement('canvas');
canvas.width = 4096;
canvas.height = 4096;
const ctx = canvas.getContext('2d');

// logo local
const logoImg = new Image();
logoImg.crossOrigin = "anonymous";
logoImg.src = "/imagens/logot6.png.png";
logoImg.onload = () => updateDesign();

// Tamanho fixo da logo (controle removido). Mude aqui se quiser outro valor.
const LOGO_FIXED_SIZE = 300; // pixels

/* ---------------- PATTERN ---------------- */

function drawPattern(pat,c1,c2,scale){
  ctx.clearRect(0,0,4096,4096);
  ctx.fillStyle = c1;
  ctx.fillRect(0,0,4096,4096);

  if(pat === "none") return;

  ctx.fillStyle = c2;
  const s = parseInt(scale,10);

  if(pat === "stripes_v")
    for(let i=0;i<4096;i+=s) ctx.fillRect(i,0,s/2,4096);

  if(pat === "stripes_h")
    for(let i=0;i<4096;i+=s) ctx.fillRect(0,i,4096,s/2);

  if(pat === "checker")
    for(let i=0;i<4096;i+=s)
      for(let j=0;j<4096;j+=s)
        if(((i+j)/s)%2==0) ctx.fillRect(i,j,s,s);

  if(pat === "grid"){
    ctx.strokeStyle = c2;
    ctx.lineWidth = Math.max(1, s/80);
    for(let i=0;i<4096;i+=s){
      ctx.beginPath();
      ctx.moveTo(i,0);
      ctx.lineTo(i,4096);
      ctx.moveTo(0,i);
      ctx.lineTo(4096,i);
      ctx.stroke();
    }
  }

  if(pat === "dots")
    for(let i=0;i<4096;i+=s)
      for(let j=0;j<4096;j+=s){
        ctx.beginPath();
        ctx.arc(i,j,s/4,0,Math.PI*2);
        ctx.fill();
      }
}

/* ---------------- LOGO (posição FIXA: LEFT / CENTER / RIGHT) ----------------
   Valores fixos para manter sempre na mesma altura do peito.
*/
function drawLogo(pos, show){
  if(!show) return;
  if(!logoImg.complete) return;

  const size = LOGO_FIXED_SIZE;

  // VALORES FIXOS (não editáveis pelo usuário)
  const centerX = 1190;   // centro frontal
  const chestY  = 1840;    // ALTURA FIXA do peito (mais próximo do topo)
  const offset  = 420;    // deslocamento lateral para "left" / "right"

  let x = centerX - size/2;
  if(pos === "left")  x = centerX - offset - size/2;
  if(pos === "right") x = centerX + offset - size/2;

  let y = chestY - size/2;

  // Alguns UVs precisam de rotação de 180° — mantive para compatibilidade
  ctx.save();
  ctx.translate(x + size/2, y + size/2);
  ctx.rotate(Math.PI);

  // Se a posição for RIGHT, invertemos (espelhamos) horizontalmente a logo
  if(pos === "right") ctx.scale(-1,1);

  ctx.drawImage(logoImg, -size/2, -size/2, size, size);
  ctx.restore();
}

/* ---------------- COSTAS ---------------- */

function drawBack(name,num,nameColor,numColor){
  ctx.save();
  ctx.translate(3072,1800);
  ctx.rotate(Math.PI);
  ctx.scale(-1,1);

  ctx.textAlign="center";
  ctx.shadowColor="rgba(0,0,0,0.6)";
  ctx.shadowBlur=20;

  if(name){
    ctx.fillStyle=nameColor;
    ctx.font="900 220px Archivo Black";
    ctx.fillText(name.toUpperCase(),0,-200);
  }

  if(num){
    ctx.fillStyle=numColor;
    ctx.font="900 900px Archivo Black";
    ctx.fillText(num,0,750);
  }

  ctx.restore();
}

/* ---------------- UPDATE ---------------- */

function updateDesign(){
  drawPattern(
    document.getElementById("patternInput").value,
    document.getElementById("mainColor").value,
    document.getElementById("secColor").value,
    document.getElementById("patScale").value
  );

  drawLogo(
    document.getElementById("logoPos").value,
    document.getElementById("logoShow").checked
  );

  drawBack(
    document.getElementById("nameInput").value,
    document.getElementById("numInput").value,
    document.getElementById("nameColor").value,
    document.getElementById("numColor").value
  );

  if(texture) texture.needsUpdate = true;
}

/* ---------------- THREE ---------------- */

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(18, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById("viewport").appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,2));

  const light = new THREE.DirectionalLight(0xffffff,1.3);
  light.position.set(5,5,5);
  scene.add(light);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  texture = new THREE.CanvasTexture(canvas);
  texture.flipY = false;

  // Carregue seu modelo .glb (caminho: oversized_t-shirt.glb)
  new GLTFLoader().load("oversized_t-shirt.glb", (gltf) => {

    const shirt = gltf.scene;

    const box = new THREE.Box3().setFromObject(shirt);
    const center = box.getCenter(new THREE.Vector3());
    shirt.position.sub(center);
    shirt.scale.set(1.05,1.05,1.05);

    shirt.traverse(c => {
      if(c.isMesh){
        c.material = new THREE.MeshStandardMaterial({map: texture, roughness: 0.6, metalness: 0});
      }
    });

    scene.add(shirt);

    camera.position.set(0,0,8);
    controls.target.set(0,0,0);
    controls.update();

    updateDesign();
  }, undefined, (err) => {
    console.error("Erro ao carregar o GLB:", err);
  });

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// liga controles (apenas inputs restantes)
document.querySelectorAll("input,select").forEach(e => e.oninput = updateDesign);

document.getElementById("btnSave").onclick = () => {
  const link = document.createElement("a");
  link.download = "camisa_t6.png";
  link.href = renderer.domElement.toDataURL();
  link.click();
};

init();

</script>
</body>
</html>
