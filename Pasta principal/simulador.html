<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Oficial T6 Medicina</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
:root{
  --rosa:#e91e63;
  --rosa-escuro:#880e4f;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#f4f4f4,#e6e6e6);
  display:flex;
  flex-direction:column;
  align-items:center;
}

header{
  width:100%;
  padding:20px;
  background:linear-gradient(135deg,var(--rosa),var(--rosa-escuro));
  color:white;
  font-weight:600;
  text-align:center;
  font-size:20px;
}

.container{
  display:flex;
  gap:60px;
  padding:50px;
  flex-wrap:wrap;
  align-items:flex-start;
}

.menu{
  background:white;
  padding:25px;
  border-radius:20px;
  width:260px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.menu h3{
  margin-bottom:10px;
  color:var(--rosa-escuro);
}

.menu label{
  display:block;
  margin-top:12px;
  font-weight:600;
  font-size:14px;
}

.menu input{
  width:100%;
  padding:7px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

.preview-area{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

model-viewer{
  width:400px;
  height:600px;
  background:#fff;
  border-radius:15px;
}
</style>
</head>

<body>

<header>SIMULADOR OFICIAL T6 MEDICINA 🔥</header>

<div class="container">

<div class="menu">

<h3>Modelo 3D</h3>

<label>Nome</label>
<input type="text" placeholder="Seu nome">

<label>Número</label>
<input type="number" placeholder="10">

<label>Cor Uniforme</label>
<input type="color" value="#e91e63">

<label>Cor Nome</label>
<input type="color" value="#ffffff">

<label>Cor Número</label>
<input type="color" value="#ffffff">

</div>

<div class="preview-area">

<model-viewer 
    id="modelo"
    src="human_body_base_mesh_male.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">
</model-viewer>

</div>

</div>
 <script>
const modelViewer = document.querySelector("#modelo");

modelViewer.addEventListener("load", async () => {

  const material = modelViewer.model.materials[0];

  // cria textura dinâmica
  const canvas = document.createElement("canvas");
  canvas.width = 1024;
  canvas.height = 1024;
  const ctx = canvas.getContext("2d");

  // fundo rosa
  ctx.fillStyle = "#e91e63";
  ctx.fillRect(0,0,1024,1024);

  // faixa branca exemplo
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,200,1024,80);

  // nome
  ctx.fillStyle = "white";
  ctx.font = "bold 120px Arial";
  ctx.fillText("T6", 400, 500);

  const texture = await modelViewer.createTexture(canvas);

  material.pbrMetallicRoughness.setBaseColorTexture(texture);

});
</script>
</body>
</html>
