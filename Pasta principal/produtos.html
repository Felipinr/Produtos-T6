<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T6 Store | Produtos</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --rosa:#e91e63;
  --rosa-escuro:#880e4f;
  --dourado:#d4af37;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Archivo',sans-serif;
  background:#f9f9f9;
  color:#222;
}

/* HEADER */

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 80px;
  background:white;
  box-shadow:0 2px 15px rgba(0,0,0,.05);
}

.topo h1{
  font-family:'Space Grotesk',sans-serif;
  color:var(--rosa-escuro);
}

.menu{
  display:flex;
  gap:40px;
}

.menu a{
  text-decoration:none;
  font-weight:600;
  color:#444;
  transition:.3s;
}

.menu a:hover{
  color:var(--rosa);
}

/* VITRINE */

.produtos-container{
  padding:60px 80px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:40px;
}

.produto{
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  transition:.3s;
}

.produto:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.imagem-box{
  position:relative;
  width:100%;
  height:280px;
}

.imagem-box img{
  width:100%;
  height:100%;
  object-fit:contain;
  position:absolute;
  top:0;
  left:0;
  transition:.4s;
}

.imagem-box img.verso{
  opacity:0;
}

.produto:hover .frente{
  opacity:0;
}

.produto:hover .verso{
  opacity:1;
}

.produto h3{
  margin-top:15px;
  font-family:'Space Grotesk',sans-serif;
  font-size:18px;
}

.preco{
  margin-top:10px;
  font-size:18px;
  font-weight:700;
  color:var(--rosa);
}

button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,var(--rosa),var(--rosa-escuro));
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:var(--dourado);
}

/* FOOTER */

footer{
  text-align:center;
  padding:30px;
  background:var(--rosa-escuro);
  color:white;
  margin-top:60px;
}

@media(max-width:768px){
  .topo{
    flex-direction:column;
    gap:15px;
    padding:20px;
  }

  .produtos-container{
    padding:40px 20px;
  }
}
</style>

<link rel="icon" href="/imagens/logot6.png.png" type="image/png">
<link rel="shortcut icon" href="/imagens/logot6.png.png" type="image/png">
</head>

<body>

<header class="topo">
  <h1>T6 Store</h1>
  <nav class="menu">
    <a href="index.html">Início</a>
    <a href="produtos.html">Produtos</a>
    <a href="simulador.html">Customizar</a>
  </nav>
</header>

<section class="produtos-container">

<!-- PRODUTO 1 AO 12 -->
<script>
for(let i=1;i<=12;i++){
  document.write(`
  <div class="produto">
    <div class="imagem-box">
      <img src="/imagens/prod${i}f.jpg" class="frente">
      <img src="/imagens/prod${i}t.jpg" class="verso">
    </div>
    <h3>Uniforme Oficial T6 2026 - Modelo ${i}</h3>
    <div class="preco">R$ 00,90</div>
    <button onclick="window.location.href='produto${i}.html'">
      Ver Produto
    </button>
  </div>
  `);
}
</script>

</section>

<footer>
© 2025 - 2031 T6 Medicina | UNIRV
</footer>

</body>
</html>
