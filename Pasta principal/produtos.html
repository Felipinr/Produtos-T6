<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T6 Medicina - Loja Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --rosa-principal: #e91e63;
  --rosa-escuro: #880e4f;
  --dourado: #d4af37;
  --cinza-header: #f4f4f4;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #fff0f5, #ffe4ec);
  color: #333;
}

/* ================= HEADER ================= */

header {
  background: var(--cinza-header);
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 90px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo-area img {
  height: 70px;
}

.brand {
  font-weight: 700;
  font-size: 20px;
  color: var(--rosa-escuro);
}

.menu {
  list-style: none;
  display: flex;
  gap: 40px;
}

.menu li a {
  text-decoration: none;
  font-weight: 600;
  color: #444;
  transition: 0.3s;
}

.menu li a:hover {
  color: var(--rosa-principal);
}

/* ================= PRODUTOS ================= */

.produtos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 60px;
  padding: 100px 40px;
  max-width: 1200px;
  margin: 0 auto;
  justify-items: center;
}

.produto {
  background: white;
  width: 100%;
  max-width: 340px;
  border-radius: 30px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  padding: 30px 25px 35px 25px;
  text-align: center;
  transition: 0.4s ease;
}

.produto:hover {
  transform: translateY(-12px);
  box-shadow: 0 30px 50px rgba(0,0,0,0.25);
}

.produto img {
  width: 220px;
  height: auto;
  margin-bottom: 20px;
  transition: 0.4s ease;
}

.produto:hover img {
  transform: scale(1.08);
}

.produto h2 {
  color: var(--rosa-escuro);
  margin-bottom: 15px;
  font-size: 22px;
}

.produto p {
  color: #666;
  font-size: 15px;
  margin-bottom: 25px;
  line-height: 1.5;
}

/* BOTÃO PREMIUM */

.botao-comprar {
  display: inline-block;
  padding: 14px 30px;
  border-radius: 40px;
  font-weight: 600;
  text-decoration: none;
  background: linear-gradient(135deg, var(--rosa-principal), var(--rosa-escuro));
  color: white;
  box-shadow: 0 10px 25px rgba(233,30,99,.35);
  transition: 0.3s ease;
}

.botao-comprar:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 35px rgba(233,30,99,.5);
}

/* ================= FOOTER ================= */

footer {
  text-align: center;
  padding: 25px;
  background: linear-gradient(135deg, #880e4f, #ad1457);
  color: white;
  margin-top: 60px;
}

/* ================= RESPONSIVO ================= */

@media (max-width: 768px) {
  .navbar {
    padding: 0 20px;
  }

  .menu {
    gap: 20px;
  }

  .brand {
    display: none;
  }

  .produtos {
    padding: 60px 20px;
  }
}
</style>

<link rel="icon" href="/imagens/logot6.png.png" type="image/png">
</head>

<body>

<header>
  <nav class="navbar">
    <div class="logo-area">
      <a href="index.html">
        <img src="/imagens/logot6.png.png" alt="Logo T6 Medicina">
      </a>
      <span class="brand">T6 Store</span>
    </div>

    <ul class="menu">
      <li><a href="index.html">INÍCIO</a></li>
      <li><a href="produtos.html">PRODUTOS</a></li>
      <li><a href="dev.html">DESENVOLVEDOR</a></li>
    </ul>
  </nav>
</header>

<section class="produtos">

  <!-- PRODUTO 1 -->
  <div class="produto">
    <img src="/imagens/prod1f.jpg" alt="Uniforme T6 Frente">

    <h2>Produto 1</h2>
    <p>Produto exclusivo da turma T6 Medicina. Qualidade premium e edição limitada.</p>

    <a href="produto1.html" class="botao-comprar">
      Comprar Agora
    </a>
  </div>

  <!-- PRODUTO 2 -->
  <div class="produto">
    <img src="/imagens/prod2t.jpg" alt="Uniforme T6 Costas">

    <h2>Produto 2</h2>
    <p>Produto oficial da T6 UNIRV. Design sofisticado inspirado no brasão da turma.</p>

    <a href="produto2.html" class="botao-comprar">
      Comprar Agora
    </a>
  </div>

</section>

<footer>
  © 2025 - 2031 | T6 Medicina | UNIRV
</footer>

</body>
</html>
