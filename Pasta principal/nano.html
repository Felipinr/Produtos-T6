<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano-Imunidade | Defesa Biológica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #1a0505;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            user-select: none;
        }

        canvas {
            display: block;
            filter: contrast(110%) brightness(105%);
        }

        /* Interface HUD */
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: none;
            z-index: 10;
        }

        .bio-stat {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #ff4d4d;
            padding: 10px 20px;
            margin-bottom: 10px;
            backdrop-filter: blur(8px);
        }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #ffb3b3; }
        .value { font-size: 24px; font-weight: 700; color: #fff; }

        /* Overlay de Menu/Game Over */
        #overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(60, 10, 10, 0.8) 0%, rgba(20, 0, 0, 0.95) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .title {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(45deg, #ff4d4d, #ff99cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 77, 77, 0.5));
        }

        .btn {
            background: transparent;
            border: 2px solid #ff4d4d;
            color: #ff4d4d;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 40px;
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #ff4d4d;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.6);
            transform: scale(1.05);
        }

        /* Efeito de Scanline */
        #scanner {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 3px);
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="scanner"></div>

<div id="hud">
    <div class="bio-stat">
        <div class="label">Memória Imunitária</div>
        <div class="value" id="score">0</div>
    </div>
    <div class="bio-stat">
        <div class="label">Integridade Celular</div>
        <div class="value" id="health">100%</div>
    </div>
</div>

<div id="overlay">
    <h1 class="title">NANO-IMUNIDADE</h1>
    <p id="status-text" style="letter-spacing: 5px; color: #ffb3b3; margin-top: 10px;">DEFENDA A CÉLULA-TRONCO</p>
    <button class="btn" onclick="initGame()">Ativar Resposta</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gameRunning = false;
    let score = 0;
    let health = 100;
    let time = 0;
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    let enemies = [];
    let particles = [];
    let bloodCells = [];

    const core = { x: 0, y: 0, radius: 60, pulse: 0 };
    const player = { x: 0, y: 0, radius: 30, targetRadius: 30 };

    class Particle {
        constructor(x, y, color, speed = 1) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 5 * speed;
            this.vy = (Math.random() - 0.5) * 5 * speed;
            this.life = 1.0;
            this.color = color;
            this.size = Math.random() * 4 + 2;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.02; }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Enemy {
        constructor() {
            const side = Math.floor(Math.random() * 4);
            if(side === 0) { this.x = Math.random() * canvas.width; this.y = -50; }
            else if(side === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
            else if(side === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; }
            else { this.x = -50; this.y = Math.random() * canvas.height; }

            this.speed = 1.5 + (score / 200);
            this.radius = 10 + Math.random() * 10;
            this.type = Math.random() > 0.8 ? 'virus' : 'bacteria';
            this.color = this.type === 'virus' ? '#ff00ff' : '#00ffcc';
            this.angle = 0;
        }
        update() {
            const dx = core.x - this.x;
            const dy = core.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            this.x += (dx / dist) * this.speed;
            this.y += (dy / dist) * this.speed;
            this.angle += 0.05;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.beginPath();
            if(this.type === 'virus') {
                for(let i=0; i<6; i++) {
                    ctx.rotate(Math.PI/3);
                    ctx.fillRect(-2, -this.radius-5, 4, 10);
                }
                ctx.arc(0, 0, this.radius, 0, Math.PI*2);
            } else {
                ctx.ellipse(0, 0, this.radius * 1.2, this.radius * 0.7, 0, 0, Math.PI*2);
            }
            ctx.fill();
            ctx.restore();
            ctx.shadowBlur = 0;
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        core.x = canvas.width / 2;
        core.y = canvas.height / 2;
    }

    function initGame() {
        resize();
        score = 0; health = 100; time = 0;
        enemies = []; particles = []; bloodCells = [];
        player.x = core.x; player.y = core.y;
        player.targetRadius = 35; player.radius = 35;
        
        document.getElementById('score').innerText = "0";
        document.getElementById('health').innerText = "100%";
        
        for(let i=0; i<25; i++) {
            bloodCells.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: 30 + Math.random() * 40,
                s: 0.5 + Math.random() * 1.5
            });
        }

        gameRunning = true;
        document.getElementById('overlay').style.display = 'none';
        requestAnimationFrame(loop);
    }

    function loop() {
        if(!gameRunning) return;
        time++;

        // Renderização do Fundo
        ctx.fillStyle = '#1a0505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Glóbulos Vermelhos (Atmosfera)
        ctx.fillStyle = 'rgba(120, 0, 0, 0.15)';
        bloodCells.forEach(bc => {
            bc.y += bc.s;
            if(bc.y > canvas.height + 100) bc.y = -100;
            ctx.beginPath();
            ctx.ellipse(bc.x, bc.y, bc.r, bc.r * 0.8, Math.PI/4, 0, Math.PI*2);
            ctx.fill();
        });

        // Célula-Tronco Central
        core.pulse = Math.sin(time * 0.05) * 6;
        const grad = ctx.createRadialGradient(core.x, core.y, 5, core.x, core.y, core.radius + core.pulse);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(1, '#ff4d4d');
        ctx.fillStyle = grad;
        ctx.shadowBlur = 30; ctx.shadowColor = '#ff4d4d';
        ctx.beginPath();
        ctx.arc(core.x, core.y, core.radius + core.pulse, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Movimento do Jogador (Macrófago)
        player.x += (mouseX - player.x) * 0.12;
        player.y += (mouseY - player.y) * 0.12;
        player.radius += (player.targetRadius - player.radius) * 0.1;
        if(player.targetRadius > 35) player.targetRadius -= 0.04;

        ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        for(let i=0; i<10; i++) {
            let a = (i/10) * Math.PI * 2;
            let wobble = Math.sin(time * 0.08 + i) * 6;
            let px = player.x + Math.cos(a) * (player.radius + wobble);
            let py = player.y + Math.sin(a) * (player.radius + wobble);
            if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();

        // Lógica de Inimigos
        if(time % Math.max(15, 50 - Math.floor(score/50)) === 0) {
            enemies.push(new Enemy());
        }

        enemies.forEach((en, index) => {
            en.update();
            en.draw();

            // Fagocitose (Comer inimigo)
            const distP = Math.hypot(player.x - en.x, player.y - en.y);
            if(distP < player.radius + en.radius) {
                enemies.splice(index, 1);
                score += 15;
                player.targetRadius = Math.min(90, player.targetRadius + 6);
                for(let i=0; i<12; i++) particles.push(new Particle(en.x, en.y, en.color));
                document.getElementById('score').innerText = score;
            }

            // Dano na Célula-Tronco
            const distC = Math.hypot(core.x - en.x, core.y - en.y);
            if(distC < core.radius + en.radius) {
                enemies.splice(index, 1);
                health = Math.max(0, health - 10);
                document.getElementById('health').innerText = `${health}%`;
                for(let i=0; i<25; i++) particles.push(new Particle(en.x, en.y, '#ff4d4d', 2));
                if(health <= 0) endGame();
            }
        });

        // Partículas
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(loop);
    }

    function endGame() {
        gameRunning = false;
        const overlay = document.getElementById('overlay');
        const title = document.querySelector('.title');
        const status = document.getElementById('status-text');
        const btn = document.querySelector('.btn');

        overlay.style.display = 'flex';
        title.innerText = "FALHA SISTÉMICA";
        title.style.background = "linear-gradient(45deg, #ff0000, #8b0000)";
        title.style.webkitBackgroundClip = "text";
        status.innerText = `CÉLULA COMPROMETIDA | MEMÓRIA: ${score}`;
        btn.innerText = "Reiniciar Defesa";
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    resize();
</script>
</body>
</html>
