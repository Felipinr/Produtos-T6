<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Central de Sobrevivência - T6 Medicina</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --rosa:#e91e63;
  --rosa-escuro:#880e4f;
  --dourado:#d4af37;
  --cinza:#f8f8f8;
  --escuro:#1a1a1a;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Archivo',sans-serif;
  background:#ffffff;
  color:#222;
}

/* HEADER IGUAL AO INDEX */
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 80px;
  background:white;
  box-shadow:0 2px 15px rgba(0,0,0,.05);
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
}

.topo__marca a{
  display:flex;
  align-items:center;
  gap:15px;
  text-decoration:none;
}

.topo__marca img{height:60px;}

.topo__marca h1{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:22px;
  color:var(--rosa-escuro);
}

.menu{
  display:flex;
  gap:40px;
}

.menu a{
  text-decoration:none;
  font-weight:600;
  color:#444;
  transition:.3s;
  position:relative;
}

.menu a:hover{
  color:var(--rosa);
}

.menu a::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:0%;
  height:2px;
  background:var(--rosa);
  transition:.3s;
}

.menu a:hover::after{
  width:100%;
}

/* CONTEÚDO */
.main{
  padding:160px 80px 80px 80px;
  background:var(--cinza);
  min-height:100vh;
}

.main h2{
  font-family:'Space Grotesk',sans-serif;
  font-size:36px;
  margin-bottom:10px;
  color:var(--rosa-escuro);
}

.sub{
  margin-bottom:40px;
  color:#555;
}

.container{
  display:grid;
  gap:30px;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.card h3{
  font-family:'Space Grotesk',sans-serif;
  margin-bottom:15px;
  color:var(--escuro);
}

/* CONTADOR */
#contador{
  font-size:24px;
  font-weight:600;
  color:var(--rosa);
}

/* CHECKLIST */
.checklist label{
  display:block;
  margin-bottom:8px;
  cursor:pointer;
}

.progress-bar{
  margin-top:15px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
}

.progress{
  height:15px;
  width:0%;
  background:var(--dourado);
  transition:.4s;
}

/* IMC */
input{
  padding:8px;
  margin:5px 5px 5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  margin-top:10px;
  padding:8px 20px;
  border:none;
  border-radius:20px;
  background:var(--rosa);
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}

button:hover{
  background:var(--rosa-escuro);
}

#resultadoIMC{
  margin-top:10px;
  font-weight:600;
}

/* FOOTER */
footer{
  background:var(--rosa-escuro);
  color:white;
  text-align:center;
  padding:25px;
}
</style>
</head>

<body>

<header class="topo">
  <div class="topo__marca">
    <a href="index.html">
      <img src="/imagens/logot6.png.png" alt="Logo T6">
      <h1>T6 Store</h1>
    </a>
  </div>

  <nav class="menu">
    <a href="index.html">Início</a>
    <a href="produtos.html">Produtos</a>
    <a href="simulador.html">Customizar</a>
    <a href="sobrevivencia.html">Sobrevivência</a>
  </nav>
</header>

<section class="main">
  <h2>Central de Sobrevivência T6</h2>
  <p class="sub">Ferramentas reais para aguentar Medicina até 2031.</p>

  <div class="container">

    <div class="card">
      <h3>⏳ Contagem Regressiva para Formatura (Se você não reprovar!!)</h3>
      <div id="contador"></div>
    </div>

    <div class="card">
      <h3>📚 Checklist Oficial da T6</h3>

      <div class="checklist">
        <label><input type="checkbox" onchange="atualizarProgresso()"> Sobreviveu à Anatomia</label>
        <label><input type="checkbox" onchange="atualizarProgresso()"> Passou direto em embrio e biomol?</label>
        <label><input type="checkbox" onchange="atualizarProgresso()"> Fez uma maquete bonita</label>
        <label><input type="checkbox" onchange="atualizarProgresso()"> Aprendeu a aferir pressão corretamente</label>
        <label><input type="checkbox" onchange="atualizarProgresso()"> Sobreviveu à semana de provas acumuladas</label>
        <label><input type="checkbox" onchange="atualizarProgresso()"> Nunca dormiu em Conferência?</label>
        <label><input type="checkbox" onchange="atualizarProgresso()"> Primeiro plantão sem surtar</label>
        <label><input type="checkbox" onchange="atualizarProgresso()"> Explicou simpático e parassimpático sem travar</label>
      </div>

      <div class="progress-bar">
        <div class="progress" id="barra"></div>
      </div>

    </div>

    <div class="card">
      <h3>🧠 Calculadora Rápida de IMC</h3>
      <input type="number" id="peso" placeholder="Peso (kg)">
      <input type="number" id="altura" placeholder="Altura (m)" step="0.01">
      <br>
      <button onclick="calcularIMC()">Calcular</button>
      <div id="resultadoIMC"></div>
    </div>

  </div>
</section>

<footer>
© 2025 - 2031 T6 Medicina | UNIRV
</footer>

<script>
// CONTADOR
const formatura = new Date("December 31, 2031 23:59:59").getTime();

setInterval(()=>{
  const agora = new Date().getTime();
  const distancia = formatura - agora;

  const dias = Math.floor(distancia / (1000*60*60*24));
  const horas = Math.floor((distancia % (1000*60*60*24))/(1000*60*60));

  document.getElementById("contador").innerHTML =
  `${dias} dias e ${horas} horas restantes`;
},1000);

// PROGRESSO
function atualizarProgresso(){
  const checkboxes = document.querySelectorAll(".checklist input");
  let marcados = 0;
  checkboxes.forEach(c => { if(c.checked) marcados++; });
  const porcentagem = (marcados / checkboxes.length) * 100;
  document.getElementById("barra").style.width = porcentagem + "%";
}

// IMC
function calcularIMC(){
  const peso = parseFloat(document.getElementById("peso").value);
  const altura = parseFloat(document.getElementById("altura").value);

  if(!peso || !altura){
    document.getElementById("resultadoIMC").innerText = "Preencha os dados corretamente.";
    return;
  }

  const imc = (peso / (altura*altura)).toFixed(2);
  document.getElementById("resultadoIMC").innerText = `IMC: ${imc}`;
}
</script>

</body>
</html>
